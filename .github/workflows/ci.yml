name : Teste_Calculadora
on:
    push:
jobs:
    teste_job:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Configurar o Java
              uses: actions/setup-java@v4
              with:
                distribution: 'jdk'
                java-version: '25'
            - name: executar testes
              run: mvn test